apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-service
  namespace: task-orchestrator
  labels:
    app.kubernetes.io/name: monitor-service
    app.kubernetes.io/component: monitor-service
    app.kubernetes.io/part-of: task-orchestrator-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: monitor-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monitor-service
        app.kubernetes.io/component: monitor-service
        app.kubernetes.io/part-of: task-orchestrator-engine
    spec:
      serviceAccountName: task-orchestrator-sa
      containers:
        - name: monitor-service
          image: task-orchestrator/monitor-service:latest
          ports:
            - containerPort: 5003
              protocol: TCP
          env:
            - name: PORT
              value: "5003"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-orchestrator-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: task-orchestrator-secrets
                  key: redis-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
      restartPolicy: Always

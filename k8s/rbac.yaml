apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-orchestrator-sa
  namespace: task-orchestrator
  labels:
    app.kubernetes.io/part-of: task-orchestrator-engine
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: task-orchestrator-role
  namespace: task-orchestrator
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: task-orchestrator-rolebinding
  namespace: task-orchestrator
subjects:
  - kind: ServiceAccount
    name: task-orchestrator-sa
    namespace: task-orchestrator
roleRef:
  kind: Role
  name: task-orchestrator-role
  apiGroup: rbac.authorization.k8s.io

apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-api
  namespace: task-orchestrator
  labels:
    app.kubernetes.io/name: scheduler-api
    app.kubernetes.io/component: scheduler-api
    app.kubernetes.io/part-of: task-orchestrator-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: scheduler-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scheduler-api
        app.kubernetes.io/component: scheduler-api
        app.kubernetes.io/part-of: task-orchestrator-engine
    spec:
      serviceAccountName: task-orchestrator-sa
      containers:
        - name: scheduler-api
          image: task-orchestrator/scheduler-api:latest
          ports:
            - containerPort: 5000
              protocol: TCP
          env:
            - name: PORT
              value: "5000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-orchestrator-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: task-orchestrator-secrets
                  key: redis-url
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
      restartPolicy: Always

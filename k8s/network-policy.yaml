apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: task-orchestrator
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-traffic
  namespace: task-orchestrator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: task-orchestrator-engine
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: task-orchestrator-engine
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-api
  namespace: task-orchestrator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: scheduler-api
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 5000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-to-webhook
  namespace: task-orchestrator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: webhook-gateway
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 5002

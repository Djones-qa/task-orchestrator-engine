name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  typecheck-build:
    name: Type Check & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type check shared package
        run: npx tsc --noEmit --project packages/shared/tsconfig.json

      - name: Type check scheduler-api
        run: npx tsc --noEmit --project services/scheduler-api/tsconfig.json

      - name: Type check executor-service
        run: npx tsc --noEmit --project services/executor-service/tsconfig.json

      - name: Type check webhook-gateway
        run: npx tsc --noEmit --project services/webhook-gateway/tsconfig.json

      - name: Type check monitor-service
        run: npx tsc --noEmit --project services/monitor-service/tsconfig.json

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npx jest --passWithNoTests --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

  kubeconform:
    name: Kubernetes Manifest Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          kubeconform -strict -summary -output json \
            -kubernetes-version 1.29.0 \
            k8s/
